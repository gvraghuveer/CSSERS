services:
  - type: web
    name: crimeshield-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: TWILIO_ACCOUNT_SID
        sync: false # Render will prompt you to enter this private value
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EMERGENCY_CONTACT
        sync: false
      - key: EMERGENCY_CONTACT_AMBULANCE
        sync: false
      - key: EMERGENCY_CONTACT_POLICE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CRIMESHIELD_API_KEY
        sync: false
      - key: PUBLIC_URL
        sync: false # Set this to your Render Service URL after creation
